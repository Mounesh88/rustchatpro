# CI/CD Pipeline for RustChatPro
# Runs automatically on every push and pull request
# Tests on Ubuntu, Windows, and macOS

name: CI

# Trigger on push to any branch and on pull requests
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Job 1 — Build and Test
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Install Rust stable toolchain
      # with clippy and rustfmt components
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Step 3 — Cache dependencies for faster builds
      # Without cache every run downloads all crates fresh
      # With cache subsequent runs take 30s instead of 5min
      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      # Step 4 — Check code formatting
      # cargo fmt --check fails if any file is not formatted
      # Run cargo fmt locally to fix formatting issues
      - name: Check formatting
        run: cargo fmt --all -- --check

      # Step 5 — Build the project
      - name: Build
        run: cargo build --verbose

      # Step 6 — Run Clippy linter
      # Clippy catches common mistakes and bad patterns
      # -D warnings means any warning becomes an error
      - name: Run Clippy
        run: cargo clippy -- -D warnings

      # Step 7 — Run all tests
      - name: Run tests
        run: cargo test --verbose

  # Job 2 — Test on Windows too
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose