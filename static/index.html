<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RustChatPro</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #header {
    background: #16213e;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #0f3460;
  }
  #header h1 { font-size: 18px; color: #e94560; font-weight: 600; }
  #status {
    font-size: 12px; padding: 4px 10px;
    border-radius: 12px; background: #333; color: #888;
  }
  #status.connected { background: #1a3a1a; color: #4caf50; }
  #room-info { margin-left: auto; font-size: 12px; color: #888; }
  #main { display: flex; flex: 1; overflow: hidden; }
  #sidebar {
    width: 200px; background: #16213e;
    border-right: 1px solid #0f3460;
    padding: 12px; display: flex;
    flex-direction: column; gap: 8px;
  }
  #sidebar h3 {
    font-size: 11px; text-transform: uppercase;
    color: #888; letter-spacing: 1px;
  }
  .room-btn {
    background: transparent; border: 1px solid #0f3460;
    color: #e0e0e0; padding: 8px 12px; border-radius: 6px;
    cursor: pointer; text-align: left; font-size: 13px;
    transition: all 0.2s;
  }
  .room-btn:hover { background: #0f3460; }
  .room-btn.active { background: #e94560; border-color: #e94560; }
  #join-room { display: flex; gap: 6px; margin-top: 8px; }
  #join-room input {
    flex: 1; background: #0f3460; border: 1px solid #1a4a8a;
    color: #e0e0e0; padding: 6px 8px;
    border-radius: 4px; font-size: 12px;
  }
  #join-room button {
    background: #e94560; border: none; color: white;
    padding: 6px 10px; border-radius: 4px;
    cursor: pointer; font-size: 12px;
  }
  #chat-area { flex: 1; display: flex; flex-direction: column; }
  #messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .message { display: flex; flex-direction: column; gap: 2px; max-width: 80%; }
  .message.own { align-self: flex-end; }
  .message.other { align-self: flex-start; }
  .message.system { align-self: center; max-width: 100%; }
  .msg-bubble {
    padding: 8px 12px; border-radius: 12px;
    font-size: 14px; line-height: 1.4; word-break: break-word;
  }
  .own .msg-bubble { background: #e94560; color: white; border-bottom-right-radius: 2px; }
  .other .msg-bubble { background: #16213e; border: 1px solid #0f3460; border-bottom-left-radius: 2px; }
  .system .msg-bubble { background: transparent; color: #888; font-size: 12px; font-style: italic; text-align: center; }
  .msg-meta { font-size: 10px; color: #666; padding: 0 4px; }
  .own .msg-meta { text-align: right; }
  #input-area {
    padding: 12px 16px; background: #16213e;
    border-top: 1px solid #0f3460; display: flex; gap: 8px;
  }
  #msg-input {
    flex: 1; background: #0f3460; border: 1px solid #1a4a8a;
    color: #e0e0e0; padding: 10px 14px;
    border-radius: 20px; font-size: 14px; outline: none;
  }
  #msg-input:focus { border-color: #e94560; }
  #send-btn {
    background: #e94560; border: none; color: white;
    padding: 10px 20px; border-radius: 20px;
    cursor: pointer; font-size: 14px; font-weight: 600;
  }
  #send-btn:hover { background: #c73652; }
  #my-id {
    font-size: 11px; color: #666; padding: 8px 12px;
    background: #16213e; border-top: 1px solid #0f3460;
    text-align: center;
  }
</style>
</head>
<body>
<div id="header">
  <h1>RustChatPro</h1>
  <span id="status">disconnected</span>
  <span id="room-info">room: lobby</span>
</div>
<div id="main">
  <div id="sidebar">
    <h3>Rooms</h3>
    <button class="room-btn active" onclick="joinRoom('lobby')">lobby</button>
    <button class="room-btn" onclick="joinRoom('rust')"># rust</button>
    <button class="room-btn" onclick="joinRoom('general')"># general</button>
    <button class="room-btn" onclick="joinRoom('python')"># python</button>
    <div id="join-room">
      <input type="text" id="room-input" placeholder="room name"/>
      <button onclick="joinCustomRoom()">+</button>
    </div>
    <h3 style="margin-top:12px">Commands</h3>
    <button class="room-btn" onclick="sendCommand('/rooms')">/rooms</button>
    <button class="room-btn" onclick="sendCommand('/history')">/history</button>
  </div>
  <div id="chat-area">
    <div id="messages"></div>
    <div id="input-area">
      <input type="text" id="msg-input"
        placeholder="Type a message..."
        onkeydown="if(event.key==='Enter') sendMessage()"/>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
    <div id="my-id">connecting...</div>
  </div>
</div>

<script>
  let ws          = null;
  let myId        = '';
  let currentRoom = 'lobby';
  let roomKeys    = {};  // stores key per room name
  let cryptoKeys  = {};  // stores imported WebCrypto key per room

  // Import a hex key string into a WebCrypto AES-GCM key
  async function importKey(hexKey) {
    const keyBytes = new Uint8Array(
      hexKey.match(/.{2}/g).map(b => parseInt(b, 16))
    );
    return await crypto.subtle.importKey(
      'raw', keyBytes,
      { name: 'AES-GCM' },
      false,
      ['decrypt']
    );
  }

  // Decrypt a base64 encoded AES-GCM message
  async function decryptMsg(encrypted, room) {
    try {
      if (!cryptoKeys[room]) return null;

      const combined = Uint8Array.from(
        atob(encrypted), c => c.charCodeAt(0)
      );
      const nonce      = combined.slice(0, 12);
      const ciphertext = combined.slice(12);

      const plaintext = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: nonce },
        cryptoKeys[room],
        ciphertext
      );
      return new TextDecoder().decode(plaintext);
    } catch (e) {
      return null;
    }
  }

  function connect() {
    ws = new WebSocket('ws://127.0.0.1:8081');

    ws.onopen = () => {
      setStatus(true);
      addSystemMsg('Connected to RustChatPro server');
      // Request lobby key immediately on connect
      // by rejoining lobby so we receive the ROOM_KEY
      setTimeout(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send('/join lobby');
        }
      }, 500);
    };
    ws.onmessage = async (event) => {
      await handleMessage(event.data);
    };

    ws.onclose = () => {
      setStatus(false);
      addSystemMsg('Disconnected. Reconnecting in 3s...');
      setTimeout(connect, 3000);
    };

    ws.onerror = () => setStatus(false);
  }

  async function handleMessage(data) {
    // Extract client ID from welcome banner
    if (data.includes('ID      :')) {
      const match = data.match(/ID\s+:\s+([a-f0-9-]+)/);
      if (match) {
        myId = match[1].substring(0, 8);
        document.getElementById('my-id').textContent =
          'Your ID: ' + myId;
      }
    }

    // Room key — store and import for decryption
    if (data.includes('ROOM_KEY:')) {
      const match = data.match(/ROOM_KEY:([a-f0-9]+)/);
      if (match) {
        const hexKey = match[1];
        roomKeys[currentRoom] = hexKey;
        // Import key for WebCrypto API
        cryptoKeys[currentRoom] = await importKey(hexKey);
        addSystemMsg('Encryption active for room: ' + currentRoom);
      }
      return;
    }

    // Skip ACK messages
    if (data.includes('> received:')) return;

    // Respond to server PING
    if (data.includes('[server] PING')) {
      ws.send('PONG');
      return;
    }

    // Own message confirmation
    if (data.startsWith('[you →')) {
      const match = data.match(/\[you → (\w+)\]: (.+)/);
      if (match) {
        const time = new Date().toTimeString().substring(0, 8);
        addMessage(match[2], 'you', time, true);
      }
      return;
    }

    // Room message — try to decrypt
    const roomMsgMatch = data.match(
      /\[(\d+:\d+:\d+)\]\[(\w+)\]\[([a-f0-9]+)\]: (.+)/
    );
    if (roomMsgMatch) {
      const [, time, room, sender, content] = roomMsgMatch;
      if (sender !== myId) {
        // Try decrypting with room key
        const plain = await decryptMsg(content, room);
        if (plain) {
          addMessage(plain, sender, time, false);
        } else {
          // No key yet — show raw
          addMessage(content, sender, time, false);
        }
      }
      return;
    }

    // DM message
    const dmMatch = data.match(
      /\[(\d+:\d+:\d+)\]\[DM from ([a-f0-9]+)\]: (.+)/
    );
    if (dmMatch) {
      const [, time, sender, content] = dmMatch;
      addMessage('[DM] ' + content, sender, time, false);
      return;
    }

    // Joined room — update current room tracking
    if (data.includes('Joined room')) {
      const match = data.match(/Joined room '(\w+)'/);
      if (match) {
        currentRoom = match[1];
        document.getElementById('room-info').textContent =
          'room: ' + currentRoom;
      }
    }

    // System and other messages
    if (data.trim()) {
      addSystemMsg(data.trim());
    }
  }

  function addMessage(content, sender, time, isOwn) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ' + (isOwn ? 'own' : 'other');
    div.innerHTML =
      '<div class="msg-bubble">' + escapeHtml(content) + '</div>' +
      '<div class="msg-meta">' +
        (isOwn ? '' : escapeHtml(sender) + ' · ') + time +
      '</div>';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function addSystemMsg(text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message system';
    div.innerHTML =
      '<div class="msg-bubble">' + escapeHtml(text) + '</div>';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(text);
    input.value = '';
  }

  function joinRoom(room) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    currentRoom = room;
    ws.send('/join ' + room);
    document.getElementById('room-info').textContent =
      'room: ' + room;
    document.querySelectorAll('.room-btn').forEach(b => {
      b.classList.toggle('active',
        b.textContent.trim() === room ||
        b.textContent.trim() === '# ' + room
      );
    });
  }

  function joinCustomRoom() {
    const input = document.getElementById('room-input');
    const room  = input.value.trim().toLowerCase();
    if (!room) return;
    joinRoom(room);
    input.value = '';
  }

  function sendCommand(cmd) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(cmd);
  }

  function setStatus(connected) {
    const el = document.getElementById('status');
    el.textContent = connected ? 'connected' : 'disconnected';
    el.className   = connected ? 'connected' : '';
  }

  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  connect();
</script>
</body>
</html>
